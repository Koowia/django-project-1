version: '3.8'

services:
  web:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app      
      - static:/app/static
      - media:/app/media
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn shop.wsgi:application --bind 0.0.0.0:8000"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/:/etc/letsencrypt/
      - static:/app/static
      - media:/app/media
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

volumes:
  static:
  media:

networks:
  app-network:
    driver: bridge
